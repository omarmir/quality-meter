name: Publish Package Branch

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library package
        run: bun run build:library

      - name: Run library tests
        run: bun test library/src --bail

      - name: Assemble package snapshot
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: bun run package:library "$RELEASE_VERSION"

      - name: Publish package branch and tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PACKAGE_DIR="tools/package-release"
          SNAPSHOT_DIR="${RUNNER_TEMP}/package-release-snapshot"
          PACKAGE_TAG="pkg-${RELEASE_TAG}"
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf "${SNAPSHOT_DIR}"
          mkdir -p "${SNAPSHOT_DIR}"
          cp -R "${PACKAGE_DIR}/." "${SNAPSHOT_DIR}/"

          git checkout --detach "${RELEASE_TAG}"
          git switch -C package-release
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "${SNAPSHOT_DIR}/." .
          git add -A
          git commit -m "Publish ${PACKAGE_TAG}"
          git tag -f "${PACKAGE_TAG}"
          git remote set-url origin "${REMOTE_URL}"
          git push --force origin HEAD:package-release
          git push --force origin "refs/tags/${PACKAGE_TAG}"
